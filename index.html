<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Awesome Website</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-zinc-950 text-white">

  <header class="min-h-screen flex items-center justify-center text-center px-6">
    <div>
      <h1 class="text-6xl md:text-7xl font-bold mb-4">Hello, I'm Donald</h1>
      <p class="text-2xl text-zinc-400 mb-10">Building things I love</p>
      <a href="#about" class="bg-white text-black px-8 py-4 rounded-full font-medium hover:bg-zinc-200 transition">
        Learn More About Me
      </a>
    </div>
  </header>

  <section id="about" class="py-24 bg-zinc-900">
    <div class="max-w-4xl mx-auto px-6 text-center">
      <h2 class="text-4xl font-bold mb-8">About Me</h2>
      <p class="text-lg text-zinc-300 leading-relaxed">
        This is my first static website hosted on AWS Amplify. 
        Feel free to change anything you want — it's all just HTML and CSS.
      </p>
    </div>
  </section>

  <footer class="py-12 bg-black text-center text-zinc-500">
    <p>Made with ❤️ &amp; AWS Amplify • 2026</p>
  </footer>

</body>
</html>
